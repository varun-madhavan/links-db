<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script>
(function () {
  var KEY = 'links_theme_pref';
  var mql = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
  function readPref() {
    try {
      var v = localStorage.getItem(KEY);
      if (v === 'light' || v === 'dark' || v === 'system') return v;
    } catch (_) {}
    return 'system';
  }
  function resolve(pref) {
    if (pref === 'light') return 'light';
    if (pref === 'dark') return 'dark';
    return mql && mql.matches ? 'dark' : 'light';
  }
  function syncDom() {
    var pref = readPref();
    document.documentElement.dataset.themePref = pref;
    document.documentElement.dataset.theme = resolve(pref);
  }
  function onSystemChange() {
    if (readPref() !== 'system') return;
    syncDom();
    if (window.LinksTheme && window.LinksTheme.refreshCycleButton) window.LinksTheme.refreshCycleButton();
  }
  if (mql) mql.addEventListener('change', onSystemChange);
  syncDom();
  window.LinksTheme = {
    storageKey: KEY,
    readPref: readPref,
    resolve: resolve,
    syncDom: syncDom,
    setPref: function (p) {
      try { localStorage.setItem(KEY, p); } catch (_) {}
      syncDom();
      if (window.LinksTheme.refreshCycleButton) window.LinksTheme.refreshCycleButton();
    },
    cycle: function () {
      var order = ['system', 'light', 'dark'];
      var cur = readPref();
      var i = order.indexOf(cur);
      if (i < 0) i = 0;
      var next = order[(i + 1) % order.length];
      try { localStorage.setItem(KEY, next); } catch (_) {}
      syncDom();
      if (window.LinksTheme.refreshCycleButton) window.LinksTheme.refreshCycleButton();
    },
    refreshCycleButton: null,
  };
})();
  </script>
  <title>{% block title %}links_db{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --bg: #fff;
      --text: #111;
      --border: #ddd;
      --border-soft: #eee;
      --link: #0b57d0;
      --muted: #666;
      --badge-bg: #f0f0f0;
      --tag-pill-bg: #e8f0fe;
      --btn-bg: #fafafa;
      --btn-border: #ccc;
      --input-bg: #fff;
      --chip-bg: #e8e8e8;
      --chip-btn-fg: #444;
      --header-btn-fg: var(--text);
    }
    html[data-theme="dark"] {
      --bg: #1a1a1a;
      --text: #e8e8e8;
      --border: #3d3d3d;
      --border-soft: #333;
      --link: #8ab4f8;
      --muted: #9aa0a6;
      --badge-bg: #2d2d2d;
      --tag-pill-bg: #1e3a5f;
      --btn-bg: #2d2d2d;
      --btn-border: #555;
      --input-bg: #252525;
      --chip-bg: #3a3a3a;
      --chip-btn-fg: #ccc;
      --header-btn-fg: #e8e8e8;
    }
    body { font-family: system-ui, sans-serif; margin: 0; line-height: 1.5; color: var(--text); background: var(--bg); }
    header { border-bottom: 1px solid var(--border); padding: 0.75rem 1rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .hdr-spacer { flex: 1 1 auto; min-width: 0.5rem; }
    header a { color: var(--link); text-decoration: none; }
    header a.active { font-weight: 600; text-decoration: underline; }
    #theme-cycle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 2.25rem; height: 2.25rem; padding: 0; border-radius: 6px;
      border: 1px solid var(--btn-border); background: var(--btn-bg);
      color: var(--header-btn-fg); cursor: pointer;
    }
    #theme-cycle:hover { filter: brightness(1.05); }
    #theme-cycle:focus-visible { outline: 2px solid var(--link); outline-offset: 2px; }
    #theme-cycle .theme-icon { display: none; }
    html[data-theme-pref="system"] #theme-cycle .theme-icon--system { display: block; }
    html[data-theme-pref="light"] #theme-cycle .theme-icon--light { display: block; }
    html[data-theme-pref="dark"] #theme-cycle .theme-icon--dark { display: block; }
    main { padding: 1rem; max-width: 52rem; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    th, td { text-align: left; padding: 0.4rem 0.35rem; border-bottom: 1px solid var(--border-soft); vertical-align: top; }
    .badge { font-size: 0.75rem; background: var(--badge-bg); padding: 0.1rem 0.35rem; border-radius: 4px; }
    .tags span { font-size: 0.75rem; background: var(--tag-pill-bg); margin-right: 0.25rem; padding: 0.1rem 0.35rem; border-radius: 4px; }
    form.add { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
    form.add input[type="url"] { flex: 1; min-width: 12rem; padding: 0.35rem 0.5rem; }
    form.add input[name="tags"] { min-width: 10rem; padding: 0.35rem 0.5rem; }
    input[type="url"], input[type="text"], input[type="search"], select {
      background: var(--input-bg); color: var(--text); border: 1px solid var(--btn-border); border-radius: 4px;
    }
    button, .btn { cursor: pointer; padding: 0.35rem 0.65rem; border: 1px solid var(--btn-border); background: var(--btn-bg); border-radius: 4px; font-size: 0.9rem; color: var(--text); }
    a.btn { color: var(--text); }
    .muted { color: var(--muted); font-size: 0.85rem; }
    .pager { margin-top: 1rem; display: flex; gap: 0.75rem; align-items: center; }
    .pager a { color: var(--link); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <strong>links_db</strong>
    <a href="/" class="{{ 'active' if (tab|default('')) == 'inbox' else '' }}">Inbox</a>
    <a href="/read-list" class="{{ 'active' if (tab|default('')) == 'read' else '' }}">Read</a>
    <a href="/archive" class="{{ 'active' if (tab|default('')) == 'archive' else '' }}">Archive</a>
    <span class="hdr-spacer" aria-hidden="true"></span>
    <button type="button" id="theme-cycle" aria-label="">
      <svg class="theme-icon theme-icon--system" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <svg class="theme-icon theme-icon--light" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="theme-icon theme-icon--dark" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>
  <main>
    {% block body %}{% endblock %}
  </main>
  <script>
(function () {
  var LT = window.LinksTheme;
  if (!LT) return;
  var btn = document.getElementById('theme-cycle');
  if (!btn) return;
  function cycleHint() {
    var order = { system: 'light', light: 'dark', dark: 'system' };
    var cur = LT.readPref();
    var next = order[cur] || 'light';
    return 'Next: ' + next + ' mode.';
  }
  function refreshCycleButton() {
    var pref = LT.readPref();
    var res = LT.resolve(pref);
    var human = pref.charAt(0).toUpperCase() + pref.slice(1);
    var label;
    if (pref === 'system') {
      label = 'Theme: System (currently ' + res + '). ' + cycleHint();
    } else {
      label = 'Theme: ' + human + '. ' + cycleHint();
    }
    btn.setAttribute('aria-label', label);
    btn.setAttribute('title', label);
  }
  LT.refreshCycleButton = refreshCycleButton;
  refreshCycleButton();
  btn.addEventListener('click', function () { LT.cycle(); });
})();
  </script>
</body>
</html>
